name: Test đọc file README                # Tên kịch bản

on:                                       # khi nào bắt đầu kịch bản
  push:
    branches: [ "main" ]                  # chạy khi có code mới đẩy vào main

jobs:                                     # những công việc sẽ làm khi chạy
  thuc_hanh_doc_file:
    runs-on: ubuntu-latest                # mượn máy ảo Ubuntu của github để chạy

    steps:
      - name: Bước 1 - Xin chào
        run: echo "hello"

      - name: Bước 2 - Tải code
        run: actions/checkout@v6.0.2

      - name: Bước 3 - Đọc file
        run: cat README.md
